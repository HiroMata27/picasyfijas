<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ranking</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0f0f1a; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .navbar { background-color: #1a1a2e; border-bottom: 2px solid #6c63ff; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        .navbar-brand { color: #6c63ff; font-weight: bold; font-size: 1.5rem; text-decoration: none; }
        .btn-volver { color: #aaa; text-decoration: none; }
        .btn-volver:hover { color: #6c63ff; }
        .container { max-width: 800px; margin: 3rem auto; padding: 0 1rem; }
        h1 { color: #6c63ff; text-align: center; margin-bottom: 2rem; font-size: 2.5rem; }
        .tabla-ranking { width: 100%; border-collapse: collapse; }
        .tabla-ranking thead tr { background-color: #6c63ff; }
        .tabla-ranking th { padding: 1rem; text-align: left; font-weight: 600; }
        .tabla-ranking td { padding: 1rem; border-bottom: 1px solid #6c63ff22; }
        .tabla-ranking tbody tr { background-color: #1a1a2e; transition: background 0.2s; }
        .tabla-ranking tbody tr:hover { background-color: #6c63ff11; }
        .puesto-1 { color: #ffd700; font-weight: bold; }
        .puesto-2 { color: #c0c0c0; font-weight: bold; }
        .puesto-3 { color: #cd7f32; font-weight: bold; }
        .avatar-tabla { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #6c63ff; background-color: #0f0f1a; }
        .sin-datos { text-align: center; color: #aaa; padding: 3rem; background-color: #1a1a2e; border-radius: 15px; }
        .btn-jugar { background-color: #6c63ff; color: white; border: none; padding: 0.75rem 2rem; border-radius: 50px; text-decoration: none; display: inline-block; margin-top: 1.5rem; transition: all 0.3s; }
        .btn-jugar:hover { background-color: #5a52d5; color: white; }
    </style>
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">PICAS Y FIJAS</a>
    <a th:href="@{/}" class="btn-volver">Volver al inicio</a>
</nav>

<div class="container">
    <h1>Ranking</h1>

    <div th:if="${#lists.isEmpty(ranking)}" class="sin-datos">
        <p>Aun no hay partidas registradas.</p>
        <a th:href="@{/registro}" class="btn-jugar">Ser el primero</a>
    </div>

    <table class="tabla-ranking" th:if="${!#lists.isEmpty(ranking)}">
        <thead>
        <tr>
            <th>Puesto</th>
            <th>Avatar</th>
            <th>Jugador</th>
            <th>Intentos</th>
            <th>Tiempo</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p, stat : ${ranking}">
            <td>
                <span th:if="${stat.index == 0}" class="puesto-1">1</span>
                <span th:if="${stat.index == 1}" class="puesto-2">2</span>
                <span th:if="${stat.index == 2}" class="puesto-3">3</span>
                <span th:if="${stat.index > 2}" th:text="${stat.index + 1}"></span>
            </td>
            <td><img class="avatar-tabla" th:src="${p.usuarioAvatar}" alt="avatar"></td>
            <td th:text="${p.usuarioNombre}">nombre</td>
            <td th:text="${p.intentos}">0</td>
            <td th:text="${p.tiempoSegundos} + 's'">0s</td>
        </tr>
        </tbody>
    </table>

    <div style="text-align:center; margin-top:2rem;">
        <a th:href="@{/registro}" class="btn-jugar">Jugar</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
