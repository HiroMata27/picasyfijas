<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Juego</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0f0f1a; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .navbar { background-color: #1a1a2e; border-bottom: 2px solid #6c63ff; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        .navbar-brand { color: #6c63ff; font-weight: bold; font-size: 1.5rem; text-decoration: none; }
        .user-info { display: flex; align-items: center; gap: 0.75rem; }
        .user-info img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #6c63ff; background-color: #0f0f1a; }
        .user-info span { color: #aaa; }
        .container { max-width: 700px; margin: 3rem auto; padding: 0 1rem; }
        .card { background-color: #1a1a2e; border: 1px solid #6c63ff33; border-radius: 15px; padding: 2rem; margin-bottom: 1.5rem; }
        h2 { color: #6c63ff; margin-bottom: 1.5rem; text-align: center; }
        .timer { text-align: center; font-size: 1.5rem; color: #6c63ff; margin-bottom: 1rem; font-weight: bold; }
        .intentos-badge { text-align: center; margin-bottom: 1.5rem; }
        .badge-intentos { background-color: #6c63ff22; border: 1px solid #6c63ff; color: #6c63ff; padding: 0.5rem 1.5rem; border-radius: 50px; font-size: 1rem; }
        .form-control { background-color: #0f0f1a; color: #fff; border: 1px solid #6c63ff44; border-radius: 8px; padding: 0.75rem; font-size: 1.5rem; text-align: center; letter-spacing: 0.5rem; }
        .form-control:focus { background-color: #0f0f1a; color: #fff; border-color: #6c63ff; box-shadow: 0 0 0 0.2rem rgba(108,99,255,0.25); }
        .btn-intentar { background-color: #6c63ff; color: white; border: none; width: 100%; padding: 0.9rem; border-radius: 8px; font-size: 1rem; margin-top: 1rem; transition: all 0.3s; }
        .btn-intentar:hover { background-color: #5a52d5; }
        .mensaje { text-align: center; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-weight: bold; }
        .mensaje-error { background-color: #ff444422; border: 1px solid #ff4444; color: #ff6666; }
        .mensaje-ganaste { background-color: #44ff6622; border: 1px solid #44ff66; color: #44ff66; }
        .mensaje-normal { background-color: #6c63ff22; border: 1px solid #6c63ff44; color: #aaa; }
        .historial { list-style: none; padding: 0; }
        .historial li { background-color: #0f0f1a; border: 1px solid #6c63ff22; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; color: #ccc; font-family: monospace; }
        .btn-nuevo { background-color: transparent; color: #6c63ff; border: 2px solid #6c63ff; width: 100%; padding: 0.9rem; border-radius: 8px; font-size: 1rem; margin-top: 1rem; transition: all 0.3s; text-decoration: none; display: block; text-align: center; }
        .btn-nuevo:hover { background-color: #6c63ff; color: white; }
    </style>
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">PICAS Y FIJAS</a>
    <div class="user-info">
        <img th:src="${usuario.avatar}" alt="avatar">
        <span th:text="${usuario.nombre}">usuario</span>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h2>Adivina el Numero</h2>

        <div class="timer">
            Tiempo: <span id="timer">00:00</span>
        </div>

        <div class="intentos-badge">
            <span class="badge-intentos">Intentos: <span th:text="${intentos}">0</span></span>
        </div>

        <div th:if="${mensaje != ''}"
             th:classappend="${gano} ? 'mensaje-ganaste' : (${mensaje.contains('Ingresa')} ? 'mensaje-error' : 'mensaje-normal')"
             class="mensaje">
            <span th:text="${mensaje}"></span>
        </div>

        <div th:if="${gano == null or !gano}">
            <form th:action="@{/juego/intentar}" method="post">
                <input type="text" name="intento" class="form-control"
                       maxlength="4" placeholder="0000"
                       pattern="\d{4}" required autofocus>
                <button type="submit" class="btn-intentar">Intentar</button>
            </form>
        </div>

        <div th:if="${gano}">
            <a th:href="@{/ranking}" class="btn-intentar" style="display:block; text-align:center; text-decoration:none; margin-top:1rem;">Ver Ranking</a>
            <a th:href="@{/registro}" class="btn-nuevo">Jugar de Nuevo</a>
        </div>
    </div>

    <div class="card" th:if="${!#lists.isEmpty(historial)}">
        <h2>Historial</h2>
        <ul class="historial">
            <li th:each="h : ${historial}" th:text="${h}"></li>
        </ul>
    </div>
</div>

<script>
    let segundos = 0;
    const timerEl = document.getElementById('timer');
    const gano = [[${gano != null and gano}]];
    if (!gano && timerEl) {
        setInterval(() => {
            segundos++;
            const m = String(Math.floor(segundos / 60)).padStart(2, '0');
            const s = String(segundos % 60).padStart(2, '0');
            timerEl.textContent = m + ':' + s;
        }, 1000);
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
