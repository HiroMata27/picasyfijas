<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0f0f1a; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .navbar { background-color: #1a1a2e; border-bottom: 2px solid #6c63ff; padding: 1rem 2rem; }
        .navbar-brand { color: #6c63ff; font-weight: bold; font-size: 1.5rem; text-decoration: none; }
        .container { max-width: 600px; margin: 4rem auto; padding: 0 1rem; }
        .card { background-color: #1a1a2e; border: 1px solid #6c63ff33; border-radius: 15px; padding: 2.5rem; }
        h2 { color: #6c63ff; margin-bottom: 1.5rem; text-align: center; }
        .form-label { color: #aaa; }
        .form-control { background-color: #0f0f1a; color: #fff; border: 1px solid #6c63ff44; border-radius: 8px; padding: 0.75rem; }
        .form-control:focus { background-color: #0f0f1a; color: #fff; border-color: #6c63ff; box-shadow: 0 0 0 0.2rem rgba(108,99,255,0.25); }
        .btn-registrar { background-color: #6c63ff; color: white; border: none; width: 100%; padding: 0.9rem; border-radius: 8px; font-size: 1rem; margin-top: 1rem; transition: all 0.3s; }
        .btn-registrar:hover { background-color: #5a52d5; }
        .avatares-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 0.5rem; }
        .avatar-option { cursor: pointer; text-align: center; }
        .avatar-option input[type="radio"] { display: none; }
        .avatar-option img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid transparent; transition: all 0.3s; background-color: #0f0f1a; padding: 5px; }
        .avatar-option input[type="radio"]:checked + img { border-color: #6c63ff; box-shadow: 0 0 15px #6c63ff88; }
        .avatar-option img:hover { border-color: #6c63ff88; }
        .error { background-color: #ff444422; border: 1px solid #ff4444; border-radius: 8px; padding: 0.75rem; margin-bottom: 1rem; color: #ff6666; text-align: center; }
    </style>
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">PICAS Y FIJAS</a>
</nav>

<div class="container">
    <div class="card">
        <h2>Crear Perfil</h2>

        <div th:if="${error}" class="error">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/registro}" method="post" th:object="${usuarioDto}">
            <div class="mb-4">
                <label class="form-label" for="nombre">Nombre de usuario</label>
                <input id="nombre" type="text" class="form-control" th:field="*{nombre}" placeholder="Ej: jugador123" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Elige tu avatar</label>
                <div class="avatares-grid">
                    <label class="avatar-option" th:each="av, stat : ${avatares}">
                        <input type="radio" name="avatar" th:value="${av}" th:checked="${stat.index == 0}">
                        <img th:src="${av}" alt="avatar">
                    </label>
                </div>
            </div>

            <button type="submit" class="btn-registrar">Comenzar a Jugar</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
